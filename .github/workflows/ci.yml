name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lower-back-assessment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate content
        run: npm run content:validate

      - name: Build
        run: npm run build

      - name: Validate SEO metadata
        run: npm run seo:validate

      - name: Check links
        run: npm run links:check
