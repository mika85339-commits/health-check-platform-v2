name: Generate and publish safe health article

on:
  schedule:
    - cron: "0 0 1,4,7,10,13,16,19,22,25,28 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lower-back-assessment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate one article and social draft
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: npm run content:generate

      - name: Validate generated draft
        run: npm run content:validate

      - name: Publish only if safety checks pass
        run: npm run content:auto-publish

      - name: Validate site after publish decision
        run: |
          npm run content:validate
          npm run build
          npm run seo:validate
          npm run links:check

      - name: Commit generated content and publish decision
        run: |
          git restore -- dist || true
          git clean -fd -- dist || true
          git add content content-notification.json || true
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "content: generate and publish safe health article"
            git push
          else
            echo "No content changes to commit."
          fi

      - name: Notify result
        if: always()
        env:
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npm run notify:content -- --event=generated --status=${{ job.status }}
